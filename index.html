<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prova de Chinês</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23b3262d'/%3E%3Ctext x='32' y='42' text-anchor='middle' font-size='32' fill='white' font-family='Arial'%3EC%3C/text%3E%3C/svg%3E" />
    <link rel="stylesheet" href="./src/styles.css?v=2026-06-22-1" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Estudo de Chinês</p>
        <h1>Provas simuladas</h1>
      </div>
      <label class="exam-picker">
        <span>Prova</span>
        <select id="examSelect" aria-label="Selecionar prova"></select>
      </label>
    </header>

    <main>
      <section id="homeScreen" class="home-screen">
        <div class="home-copy">
          <p class="eyebrow">Central de prática</p>
          <h2>Estude chinês com simulados feitos para revisar de verdade.</h2>
          <p>Escolha um treino, responda no seu ritmo e veja o gabarito comentado ao final. Novos simulados e revisões podem entrar aqui conforme o curso avança.</p>
        </div>
        <div id="examCards" class="exam-cards" aria-label="Lista de provas"></div>
      </section>
    </main>

    <main id="examScreen" class="shell" hidden>
      <aside class="sidebar" aria-label="Progresso da prova">
        <div class="score-panel">
          <span class="score-label">Progresso</span>
          <strong id="progressText">0/0</strong>
          <div class="progress-track" aria-hidden="true">
            <div id="progressBar" class="progress-bar"></div>
          </div>
        </div>
        <nav id="sectionNav" class="section-nav"></nav>
      </aside>

      <section class="workspace">
        <div id="examIntro" class="exam-intro"></div>
        <form id="examForm" class="exam-form"></form>
        <section id="results" class="results" hidden></section>
      </section>
    </main>

    <script src="./src/app.js?v=2026-06-22-1" type="module"></script>
  </body>
</html>
